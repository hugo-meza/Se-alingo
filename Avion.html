<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rastro Curvo</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: space-around; /* Separados para que se note la curva */
            align-items: center;
            padding: 50px;
            font-family: sans-serif;
            background-color: #f0f8ff;
        }

        .boton {
            padding: 15px 30px;
            background-color: #e91e63; /* Color rosa para variar */
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 10;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #lienzo-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Estilo de la curva */
        #linea-rastro {
            fill: none;            /* ¡IMPORTANTE! Sin relleno, solo borde */
            stroke: #555;
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            stroke-linecap: round;
            animation: moverRastro 1s linear infinite;
        }

        @keyframes moverRastro {
            to { stroke-dashoffset: -20; }
        }
    </style>
</head>
<body>

    <button id="btn1" class="boton" style="margin-top: 200px">Origen 🛫</button>
    <button id="btn2" class="boton">Destino 🛬</button>

    <svg id="lienzo-svg">
        <path id="linea-rastro" d="" />
    </svg>

    <script>
        function conectarBotones() {
            const btn1 = document.getElementById('btn1');
            const btn2 = document.getElementById('btn2');
            const path = document.getElementById('linea-rastro');

            // 1. Obtener centros
            const rect1 = btn1.getBoundingClientRect();
            const rect2 = btn2.getBoundingClientRect();

            const x1 = rect1.left + (rect1.width / 2) + window.scrollX;
            const y1 = rect1.top + (rect1.height / 2) + window.scrollY;
            const x2 = rect2.left + (rect2.width / 2) + window.scrollX;
            const y2 = rect2.top + (rect2.height / 2) + window.scrollY;

            // 2. Calcular el PUNTO DE CONTROL (El imán invisible)
            // Calculamos la mitad exacta entre los dos botones
            const midX = (x1 + x2) / 2;
            const midY = (y1 + y2) / 2;

            // Decidimos qué tan alto será el arco.
            // Aquí le resto 150px a la altura para que la curva suba.
            // Si quieres que baje, suma en lugar de restar.
            const controlX = midX; 
            const controlY = midY - 150; 

            // 3. Crear el comando SVG
            // M = Moverse al inicio (x1, y1)
            // Q = Curva Cuadrática usando el control (controlX, controlY) hacia el final (x2, y2)
            const d = `M ${x1} ${y1} Q ${controlX} ${controlY} ${x2} ${y2}`;

            path.setAttribute('d', d);
        }

        conectarBotones();
        window.addEventListener('resize', conectarBotones);
    </script>
</body>
</html>
